name: Build Cron

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup
        run: yarn --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
        env:
          JWT_EMAIL: ${{ secrets.JWT_EMAIL }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          NETWORK_CODE: ${{ secrets.NETWORK_CODE }}

      - name: Setup git user
        uses: fregante/setup-git-user@v2

      - name: Update state
        id: state
        run: | # shell
          COMMIT="$(yarn commit:state)"
          if [[ -n "$COMMIT" ]]; then
            MESSAGE="$(echo "$COMMIT" | jq -r '.commitMessage')"
            git add -A
            git commit -m "$MESSAGE"
            git push
          fi
